  gatsby:{n:"《了不起的盖茨比》",s:"The Eternal Dreamer",d:"你拥有一种近乎神圣的「希望」天赋。你的一生都在追逐一个遥远的绿光，哪怕那光芒属于过去。你用华丽的物质或虚幻的理想来包裹一颗纯真且孤独的心。",c:"纯粹的理想与腐朽现实之间的永恒拉锯。",sc:"海水的咸味与昂贵的香槟",note:"我们继续奋力向前，逆水行舟。",author:"菲茨杰拉德",hue:"爵士时代的金与忧郁的蓝",a:{R:-1,B:1,S:1,T:-.5}},
  karamazov:{n:"《卡拉马佐夫兄弟》",s:"The Soul Seeker",d:"你的灵魂是一个巨大的战场，上帝与魔鬼在这里博弈。你深刻、沉重，对人性的黑暗与光辉都有着惊人的直觉。你无法停止对终极意义的拷问。",c:"对自由意志的渴望与对苦难的深刻同情。",sc:"寒冷的泥土与焚香",note:"要爱生活，胜过爱生活的意义。",author:"陀思妥耶夫斯基",hue:"深沉的铁锈红",a:{R:1,B:-.5,S:-.5,T:1}},
  solitude:{n:"《百年孤独》",s:"The Solitary Oracle",d:"你的一生是一场漫长的循环。你在繁华中看见荒凉，在血缘中看见疏离。你拥有一种魔幻的视角，能将琐碎的生活升华为永恒的史诗。",c:"个体在历史洪流中无法逃脱的孤独宿命。",sc:"潮湿的雨林与羊皮纸",note:"生命中所有的灿烂，终究都要用寂寞来偿还。",author:"马尔克斯",hue:"枯萎的琥珀色",a:{R:-.5,B:1,S:1,T:-1}},
  stranger:{n:"《局外人》",s:"The Absurd Observer",d:"你以一种近乎冷酷的诚实观察着世界。你拒绝参与虚伪的情感表演，这让你显得与世界格格不入。你拥抱荒诞，并在荒诞中获得了某种奇异的自由。",c:"真实的自我与社会道德契约之间的断裂。",sc:"烈日下的海滩与干硬的岩石",note:"我第一次向这个冷漠的世界敞开了心扉。",author:"加缪",hue:"苍白的日光色",a:{R:1,B:1,S:1,T:0}},
  redchamber:{n:"《红楼梦》",s:"The Fragile Visionary",d:"你拥有一颗极度敏锐且多情的心。你见证了繁华的极致，也预见了幻灭的必然。你的一生是在美与痛的交织中，完成一场关于「空」的修行。",c:"至情至性与万物皆空的终极悖论。",sc:"冷香丸与枯萎的落花",note:"好一似食尽鸟投林，落了片片干净。",author:"曹雪芹",hue:"残阳般的胭脂红",a:{R:-1,B:-.8,S:-.8,T:-1}},
  ulysses:{n:"《尤利西斯》",s:"The Urban Wanderer",d:"你的一生是一场在琐碎日常中进行的奥德赛。你博学、杂乱、充满意识流的跳跃。你在平凡的行走与思考中，构建了一个宏大的精神宇宙。",c:"平庸生活中的英雄主义与精神流浪。",sc:"清晨的咖啡与旧报纸",note:"是的，我说我愿意，是的。",author:"乔伊斯",hue:"迷宫般的灰色",a:{R:1,B:-1,S:-1,T:.5}},
  hamlet:{n:"《哈姆雷特》",s:"The Hesitant Thinker",d:"生存还是毁灭？你永远在行动与思考的边缘徘徊。你拥有极高的心智，却也因此背负了沉重的精神枷锁。你的一生是对真相的痛苦追寻。",c:"清醒的认知与瘫痪的行动力。",sc:"深夜的冷风与陈旧的盔甲",note:"即便被关在果壳之中，我仍自以为是无限空间之王。",author:"莎士比亚",hue:"忧郁的深紫",a:{R:.5,B:1,S:1,T:-.8}},

  quixote:{n:"《堂吉诃德》",s:"The Knight of Faith",d:"在别人眼中你是疯子，在你眼中世界是战场。你拒绝接受平庸的现实，宁愿活在自己构建的高尚幻梦中。你是最后一个理想主义骑士。",c:"高尚的幻觉与卑微现实的碰撞。",sc:"干燥的尘土与陈旧的皮革",note:"为了追寻那遥不可及的星。 ",author:"塞万提斯",hue:"明亮的土黄色",a:{R:-1,B:-1,S:1,T:.8}},
  metamorphosis:{n:"《变形记》",s:"The Alienated Soul",d:"你感到自己与世界格格不入，仿佛一夜之间变成了异类。你承担着责任，却得不到理解。你的一生是在沉默中逐渐枯萎的异化过程。",c:"个体价值在工具化社会中的彻底崩塌。",sc:"阴暗房间里的霉味",note:"他回想起自己的家人，心中充满了温情和爱。",author:"卡夫卡",hue:"压抑的甲壳棕",a:{R:1,B:1,S:1,T:-1}},
  siddhartha:{n:"《悉达多》",s:"The Silent Seeker",d:"你经历过放纵，也经历过苦修，最终在流水的静默中找到了真理。你不再向外寻求，而是向内觉醒。你的一生是一场圆满的归家之旅。",c:"自我的迷失与万物合一的觉悟。",sc:"恒河边的水汽与檀香",note:"知识可以传授，但智慧不能。",author:"黑塞",hue:"宁静的河水绿",a:{R:-.5,B:-1,S:1,T:1}},
  nineteen84:{n:"《1984》",s:"The Conscious Watcher",d:"在众人都沉睡或狂热时，你是那个痛苦的清醒者。你珍视记忆与真相，即便它们会让你粉身碎骨。你的一生是对自由灵魂的最后守望。",c:"脆弱的人性与庞大的权力机器。",sc:"廉价的杜松子酒与陈旧的灰尘",note:"在仇恨的时代，保持爱是一种革命。",author:"奥威尔",hue:"冰冷的铁灰色",a:{R:1,B:1,S:1,T:-.9}},
  moby:{n:"《白鲸》",s:"The Willful Avenger",d:"你拥有一种近乎毁灭性的意志力。为了追逐心中的那个目标（或仇恨），你可以牺牲一切。你的一生是与命运、与自然、与神性的惨烈搏斗。",c:"人类意志与不可抗拒的自然伟力。",sc:"咸腥的海风与鲸油味",note:"我从地狱的核心刺向你。",author:"梅尔维尔",hue:"狂暴的深海蓝",a:{R:-.8,B:-1,S:1,T:-.5}},
  janeeyre:{n:"《简·爱》",s:"The Dignified Rebel",d:"你贫穷、低微、不美，但你拥有最坚韧的自尊。你拒绝依附，拒绝施舍，你要求的是灵魂的平等。你的一生是自我尊严的抗争史。",c:"卑微的出身与高贵的灵魂尊严。",sc:"雨后的石楠花与壁炉火",note:"我不是作为血肉之躯在同你说话，而是我的灵魂同你的灵魂在对话。",author:"夏洛特·勃朗特",hue:"坚韧的石楠灰",a:{R:1,B:-1,S:-.5,T:1}},
  walden:{n:"《瓦尔登湖》",s:"The Minimalist Hermit",d:"你向往极简的生活，认为文明的繁琐只是负担。你愿意在自然中寻找灵魂的养分，在寂静中听见内心的声音。你的一生是向生活本质的深挖。",c:"物质的匮乏与精神的极度丰盈。",sc:"松针与清晨湖水的清香",note:"我步入丛林，因为我希望活得深刻。",author:"梭罗",hue:"原木色与森林绿",a:{R:1,B:-1,S:1,T:1}},
  inferno:{n:"《神曲》",s:"The Abyssal Pilgrim",d:"你的一生是一场穿越地狱与炼狱，最终抵达天堂的朝圣。你敢于直面人性最深处的罪恶，并从中寻找上升的路径。你是一个永恒的攀登者。",c:"肉体的沉沦与灵魂的净化。",sc:"硫磺、血迹与星光的混合",note:"在这里，一切犹豫都必须抛弃。",author:"但丁",hue:"从暗红到极光的渐变",a:{R:-1,B:1,S:-1,T:1}}
};

  {q:"你认为美的极致是？",o:[["毁灭那一刻的壮丽与感伤","redchamber",{R:-1,T:-1}],["在极度简朴中透出的神性","walden",{R:1,S:1}],["在混乱与肮脏中开出的灵魂之花","karamazov",{T:1,R:1}],["在无限的意识流中捕捉到的瞬间","ulysses",{R:1,S:-1}]]},
  {q:"如果宇宙是一本书，你希望你是？",o:[["一个记录所有细节的、全知全能的叙述者","solitude",{B:1,S:1}],["一个不断推翻旧情节、书写新篇章的作者","faust",{B:1,T:1}],["一个在字里行间寻找意义的孤独读者","hamlet",{S:1,B:1}],["一个拒绝被写进结局的、叛逆的注脚","stranger",{R:1,B:1}]]}
];

let cur=0; const dS={R:0,B:0,S:0,T:0};
function start() { document.getElementById('cover').style.display='none'; document.getElementById('quiz').style.display='block'; renderQ(); }
function renderQ() {
  const q = Q[cur]; document.getElementById('qText').innerText = q.q;
  document.getElementById('qNum').innerText = "CHAPTER " + (cur+1).toString().padStart(2,'0');
  document.getElementById('progress').style.width = ((cur+1)/Q.length*100) + "%";
  const opts = document.getElementById('qOpts'); opts.innerHTML = '';
  q.o.forEach((o, i) => {
    const btn = document.createElement('button'); btn.className = 'opt-btn';
    btn.innerText = o[0]; btn.onclick = () => select(i);
    opts.appendChild(btn);
  });
}
function select(i) {
  const pk = Q[cur].o[i]; for(let k in pk[2]) dS[k] += pk[2][k];
  if(cur < Q.length-1) { cur++; renderQ(); } else { showResult(); }
}
function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const u = {}; for(let k in dS) u[k] = dS[k]/8;
  const scores = [];
  Object.keys(P).forEach(k => {
    let dot=0, na=0, nb=0;
    for(let d in u) { dot += u[d]*P[k].a[d]; na += u[d]**2; nb += P[k].a[d]**2; }
    let cos = (na&&nb) ? dot/(Math.sqrt(na)*Math.sqrt(nb)) : 0;
    scores.push({key:k, val: cos + (Math.random()*0.15)}); 
  });
  scores.sort((a,b)=>b.val - a.val);
  const win = P[scores[0].key];
  document.getElementById('resTitle').innerText = win.n;
  document.getElementById('resSub').innerText = win.s;
  document.getElementById('resDesc').innerText = win.d;
  document.getElementById('resConflict').innerText = win.c;
  document.getElementById('tagScent').innerText = win.sc;
  document.getElementById('tagNote').innerText = win.note;
  document.getElementById('tagAuthor').innerText = win.author;
  document.getElementById('tagHue').innerText = win.hue;
  document.getElementById('result').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
