<style>

  :root { --bg: #030305; --accent: #6366f1; --dim: #666; --bright: #e2e8f0; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {

  .result-page { display: none; text-align: left; }

  .res-title { font-size: 36px; letter-spacing: 12px; color: #fff; font-weight: 200; margin-bottom: 10px; }

<script>
const P={
  neutron:{n:"坍缩的中子星",s:"Extreme Density",d:"你将庞大的质量压缩在微小的体积内，外表冷峻坚硬，核心却在疯狂自旋。你并不轻易示人，但任何靠近你的物质都会被你那恐怖的引力重塑。你代表着秩序的终极形态，也是爆发前最深沉的寂静。",p:"你拥有极强的掌控欲，却又在内心深处渴望一个能让你彻底卸下防备的黑洞。你用秩序对抗焦虑，用沉默掩盖爆发。",sc:"冷冽的生铁与臭氧味",fr:"0.001Hz 极低频脉冲",sy:"奇点黑洞",pr:"凌晨三点的清醒者",a:{C:.9,D:.8,O:1,T:-.7,M:-.9,E:.6}},
  nebula:{n:"初生的弥散星云",s:"Cradle of Stars",d:"你拥有一种温柔而广阔的混沌感。你拒绝被定义，拒绝被固化。你是色彩斑斓的尘埃与气体，漫无目的地漂浮在深空之中。然而，正是这种看似无序的扩散，孕育了未来的恒星。",p:"你对他人的痛苦有着天然的共感，却常在自己的情绪迷雾中走失。你给予他人无限的可能性，却唯独对自己感到迷茫。",sc:"雨后森林的泥土与新芽",fr:"432Hz 宇宙治愈音",sy:"超新星残骸",pr:"永远的理想主义者",a:{C:-.8,D:-.9,O:-.9,T:.4,M:1,E:.8}},
  blackhole:{n:"奇点黑洞",s:"The Great Devourer",d:"你是宇宙最深处的欲望，试图将万物归一。在你的视界之内，一切逻辑都失效了。你是万物的终点，也是通往另一个不可知维度的唯一入口。",p:"你极度渴望亲密与融合，却又在潜意识里害怕被他人彻底看穿。你通过不断索取信息或情感来填补内心的虚无。",sc:"焚烧过后的旧报纸与灰烬",fr:"0Hz 绝对静默",sy:"坍缩的中子星",pr:"秘密的守护者",a:{C:.7,D:1,O:.9,T:-.9,M:-.98,E:-.9}},
  solarflare:{n:"恒星耀斑",s:"Plasma Eruption",d:"你是纯粹的能量爆发，无法忍受长久的压抑。你炽热、狂暴、不可阻挡，能瞬间摧毁电子的秩序。你的辉煌虽然短暂，但足以照亮整个星系。",p:"你拥有极其耀眼的才华，却常因无法控制情绪而自伤。你渴望被看见，却又在被注视时感到一种毁灭性的灼热。",sc:"干燥的木材与电火花",fr:"528Hz 能量频率",sy:"类星体",pr:"瞬间的完美主义者",a:{C:-.98,D:-.6,O:-.9,T:1,M:.5,E:-.5}},
  entropy:{n:"热寂的余温",s:"The Final Echo",d:"你是宇宙最后的温柔。当恒星熄灭，黑洞蒸发，你作为微弱的背景辐射，均匀地铺满整个空间。你代表着彻底的平等与终极的自由。你不再有形状，不再有重量，你只是存在本身。",p:"你已经看穿了所有竞争与输赢的虚妄。你表现得随和且不争，但这种淡然背后，其实是对世界最彻底的疏离。",sc:"冬日清晨干爽的冷空气",fr:"7.83Hz 舒曼波",sy:"暗物质云",pr:"看透剧本的观众",a:{C:1,D:-.2,O:-.8,T:-.9,M:1,E:.95}},
  quantum:{n:"量子叠加态",s:"Infinite Possibility",d:"你是逻辑的悖论，是现实的缝隙。你拒绝被观测，因为一旦被确定，你便失去了无限的可能性。你既是波也是粒子，既是生也是死。你的一生是一场永恒的捉迷藏。",p:"你讨厌被贴标签，甚至讨厌被自己定义。你拥有一种近乎神性的逃避倾向，在每一个决定面前都感到一种神圣的迟疑。",sc:"雷雨前夕潮湿的空气",fr:"随机波动的白噪音",sy:"真空零点能",pr:"不可捉摸的游离者",a:{C:-.5,D:-.5,O:-.98,T:0,M:-1,E:.4}},
  pulsar:{n:"深空脉冲星",s:"Rhythmic Beacon",d:"你是绝对理性的化身。在漫无边际的虚无中，你以微秒级的精度向全宇宙广播你的存在。你并不关心是否有人收听，你只关心自己的节奏。你拥有一种孤独而高傲的纯粹。",p:"你用极度的自律和规律来对抗世界的不确定性。你看起来极其可靠，但这种可靠是你为了不让自己崩溃而筑起的围墙。",sc:"古旧图书馆的羊皮纸味",fr:"1.4Hz 精准脉冲",sy:"分形晶体",pr:"自律的苦行僧",a:{C:.8,D:.2,O:.98,T:.6,M:-.6,E:.9}},
  rogue:{n:"流浪行星",s:"Absolute Freedom",d:"你是挣脱了引力束缚的游侠。你不再围绕任何恒星旋转，也不再受制于任何星系的秩序。你在永恒的黑暗中孤独地穿行，寒冷是你的铠甲，自由是你的底色。",p:"你追求极致的独立，拒绝任何形式的依赖。你害怕被束缚，却在获得绝对自由的瞬间，感到一种深入骨髓的寒冷。",sc:"深海深处冰冷的海水味",fr:"无规则的远空电波",sy:"真空零点能",pr:"不回头的异乡人",a:{C:.3,D:-.8,O:-.6,T:-.98,M:.8,E:-.7}},
  supernova:{n:"超新星残骸",s:"Magnificent Rebirth",d:"你是毁灭后的华丽重组。你曾经历过最惨烈的崩塌，但你并未消失，而是化作了星际间最珍贵的元素。你代表着死亡与重生的交织，你是旧世界的终结，也是新世界诞生的原材料。",p:"你总是在彻底搞砸一件事后，才能爆发出惊人的创造力。你迷恋那种“置之死地而后生”的快感，却也因此疲惫不堪。",sc:"金属碰撞产生的火药味",fr:"不稳定的震荡波",sy:"初生的弥散星云",pr:"涅槃的幸存者",a:{C:-.9,D:.4,O:-.5,T:.6,M:.9,E:.8}},
  vacuum:{n:"真空零点能",s:"Boiling Void",d:"你是虚无中沸腾的奇迹。即便在绝对的空无中，你依然在进行着微小的、不可观测的涨落。你代表着生命最底层的顽强——只要空间存在，你就存在。",p:"你看起来无欲无求，但内心其实充满了细碎的、永不停歇的渴望。你在最荒凉的环境里也能找到活下去的理由。",sc:"刚拆封的电子产品味",fr:"微小的量子涨落",sy:"量子叠加态",pr:"极简主义的生存家",a:{C:-.2,D:-.9,O:-.9,T:-.8,M:-.98,E:.98}},
  darkmatter:{n:"暗物质云",s:"Silent Presence",d:"你是宇宙中沉默的大多数。你占据了绝大部分的质量，却从不与光发生交互。你默默地维持着星系的旋转，却从不索取名分。你代表着一种深沉的守护。",p:"你拥有强大的能量，却习惯于隐藏在幕后。你害怕成为焦点，却在被彻底忽视时感到一种隐秘的失落。",sc:"深夜森林里泥土的深沉气味",fr:"不可听见的次声波",sy:"热寂的余温",pr:"幕后的支撑者",a:{C:1,D:.2,O:.7,T:-.9,M:1,E:-.3}},
  gravitywave:{n:"原初引力波",s:"Eternal Tremor",d:"你是穿越时空的永恒震颤。你诞生于宇宙大爆炸的瞬间，至今仍在时空的结构中荡漾。你代表着最古老的记忆，记录了万物起源时的那场剧变。",p:"你对过去有着近乎病态的留恋。你总是能从当下的琐碎中，听见遥远历史的回响。你的一生都在试图寻找那个最初的源头。",sc:"陈年老酒与旧木箱的气息",fr:"时空的涟漪频率",sy:"极地永冻层",pr:"怀旧的记录者",a:{C:.5,D:-.5,O:.8,T:-.8,M:1,E:1}},
  quasar:{n:"类星体",s:"Violent Brilliance",d:"你是宇宙中最明亮的暴戾中心。在你的核心，物质正以近乎光速的速度坠入黑洞，释放出足以遮蔽整个星系的光芒。你代表着极端的权力与能量。",p:"你拥有一种令人恐惧的魅力。你极度自信，却也极度孤独。你用光芒掩盖了核心处那个永远无法填满的黑洞。",sc:"强紫外线照射后的焦灼感",fr:"高能伽马射线频率",sy:"恒星耀斑",pr:"孤独的统治者",a:{C:-.9,D:1,O:.4,T:1,M:.8,E:-.8}},
  fractal:{n:"分形晶体",s:"Infinite Self-Similarity",d:"你是自我复制的完美几何。无论放大多少倍，你的结构依然如故。你代表着逻辑的极致美感，你相信微观即宏观，局部即整体。",p:"你对细节有种近乎强迫症的执着。你试图用逻辑解释一切，却在面对非理性的情感时感到彻底的无能为力。",sc:"薄荷与冰块的清冽感",fr:"完美的几何谐波",sy:"深空脉冲星",pr:"逻辑的编织者",a:{C:.9,D:-.4,O:1,T:-.4,M:-.8,E:.7}},
  photon:{n:"光子晶格",s:"Trapped Light",d:"你是被禁锢的纯粹能量。你本应以光速飞翔，却被某种精密的结构锁死在原地。你代表着被压抑的才华与被束缚的灵性。",p:"你拥有一种随时准备逃离现状的冲动。你表现得温顺，但内心深处一直在等待那个能让你彻底爆发的机会。",sc:"高压电弧击穿空气的味道",fr:"被禁锢的光波频率",sy:"类星体",pr:"潜伏的爆发者",a:{C:.6,D:-.7,O:.98,T:.8,M:-.9,E:.2}},
  permafrost:{n:"极地永冻层",s:"Frozen Memory",d:"你是时间的守墓人。你拒绝流转，在你的世界里，数万年前的呼吸依然清晰可见。你拥有一种近乎残酷的冷静，能让一切喧嚣瞬间凝固。",p:"你用冷漠保护自己不被伤害。你深信只有静止的东西才是真实的，任何流动的情感都让你感到不安。",sc:"冰川融水与古老岩石味",fr:"极低频的地球共振",sy:"原初引力波",pr:"情感的守墓人",a:{C:1,D:.3,O:.8,T:-1,M:.4,E:1}}
};

const Q=[
  {q:"如果宇宙是一场交响乐，你认为自己是？",o:[["永恒重复、作为底色的低音频率","entropy",{C:1,O:1}],["突然爆发、撕裂寂静的尖锐高音","solarflare",{C:-1,T:1}],["精准到微秒、从不迟疑的鼓点","pulsar",{O:1,M:-1}],["乐章结束后的那段令人窒息的空白","blackhole",{D:1,E:-1}]]},

  {q:"你最向往的物理状态是？",o:[["绝对零度下、万年不化的静止","permafrost",{T:-1,E:1}],["核聚变中心、物质化为流光的炽热","solarflare",{T:1,C:-1}],["星系边缘、空无一物的广袤虚无","nebula",{M:1,D:-1}],["微观世界里、概率云跳动的虚空","quantum",{M:-1,O:-1}]]},
  {q:"关于「占有」，你的物理直觉是？",o:[["吞噬一切，让万物在我的核心归一","blackhole",{D:1,O:1}],["全然散发，将能量毫无保留地播撒","nebula",{D:-1,C:-1}],["封存一切，让时间在这一刻永远凝固","permafrost",{E:1,T:-1}],["不留痕迹，像粒子穿过幽灵般穿过万物","vacuum",{M:-1,E:1}]]},
  {q:"如果时间可以被具象化，它在你眼中是？",o:[["一条永不停歇、奔向热寂的单向河流","entropy",{C:1,E:1}],["一个无限循环、严丝合缝的精密齿轮","pulsar",{O:1,E:1}],["无数个瞬间爆发、又瞬间熄灭的火花","solarflare",{C:-1,T:1}],["一片静止的深海，过去与未来并存其中","permafrost",{E:1,T:-1}]]},
  {q:"你如何理解「秩序」？",o:[["极度压缩后的坚硬与纯粹","neutron",{O:1,M:-1}],["混乱到极致后产生的宏观平衡","nebula",{O:-1,M:1}],["不可违抗、精准运行的物理定律","pulsar",{O:1,C:1}],["人为的幻觉，底层只有随机的跳动","quantum",{O:-1,M:-1}]]},
  {q:"当万物最终消亡，你希望留下什么？",o:[["一段微弱但永不消失的背景回响","gravitywave",{E:1,M:1}],["一个密度无限大、承载所有信息的点","blackhole",{D:1,M:-1}],["一场曾经照亮过整个星系的壮丽光影","supernova",{C:-1,T:1}],["什么都不留下，回归最初的对称与虚无","vacuum",{E:1,D:-1}]]},

  {q:"对于「边界」，你的态度是？",o:[["边界是神圣的，它定义了我的存在","fractal",{O:1,M:-1}],["边界是脆弱的，我生来就是为了跨越它","solarflare",{C:-1,O:-1}],["边界是不存在的，一切都在相互渗透","quantum",{O:-1,M:-1}],["边界是绝望的，一旦进入便无法逃离","blackhole",{D:1,O:1}]]},
  {q:"你如何处理内心的能量？",o:[["小心翼翼地将其禁锢在完美的结构中","photon",{O:1,T:1,M:-1}],["任由其在虚无中进行无序的涨落","vacuum",{O:-1,C:-1,M:-1}],["通过不断的自旋与摩擦将其转化为磁场","pulsar",{O:1,C:1}],["在积压到极限后进行毁灭性的释放","supernova",{C:-1,T:1}]]},

let cur=0; const dS={C:0,D:0,O:0,T:0,M:0,E:0};
function start() { document.getElementById('cover').style.display='none'; document.getElementById('quiz').style.display='block'; renderQ(); }
function renderQ() {
  const q = Q[cur]; document.getElementById('qText').innerText = q.q;
  document.getElementById('qNum').innerText = "PHASE " + (cur+1).toString().padStart(2,'0');
  document.getElementById('progress').style.width = ((cur+1)/Q.length*100) + "%";
  const opts = document.getElementById('qOpts'); opts.innerHTML = '';
  q.o.forEach((o, i) => {
    const btn = document.createElement('button'); btn.className = 'opt-btn';
    btn.innerText = o[0]; btn.onclick = () => select(i);
    opts.appendChild(btn);
  });
}
function select(i) {
  const pk = Q[cur].o[i]; for(let k in pk[2]) dS[k] += pk[2][k];
  if(cur < Q.length-1) { cur++; renderQ(); } else { showResult(); }
}
function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const u = {}; for(let k in dS) u[k] = dS[k]/8;
  const scores = [];
  Object.keys(P).forEach(k => {
    let dot=0, na=0, nb=0;
    for(let d in u) { dot += u[d]*P[k].a[d]; na += u[d]**2; nb += P[k].a[d]**2; }
    let cos = (na&&nb) ? dot/(Math.sqrt(na)*Math.sqrt(nb)) : 0;
    scores.push({key:k, val: cos + (Math.random()*0.2)}); 
  });
  scores.sort((a,b)=>b.val - a.val);
  const win = P[scores[0].key];
  document.getElementById('resTitle').innerText = win.n;
  document.getElementById('resSub').innerText = win.s;
  document.getElementById('resDesc').innerText = win.d;
  document.getElementById('resParadox').innerText = win.p;
  document.getElementById('tagScent').innerText = win.sc;
  document.getElementById('tagFreq').innerText = win.fr;
  document.getElementById('tagSync').innerText = win.sy;
  document.getElementById('tagProfile').innerText = win.pr;
  document.getElementById('result').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
